project:
  type: book
  resources:
    - "assets/fonts/**"

profile:
  default: en

execute:
  echo: false
  warning: false
  message: false
  freeze: auto

book:
  title: "12 Days to Deming"
  subtitle: "An active-learning course"
  author: "Henry R. Neave"
  site-url: https://deming.leedurbin.co.nz
  reader-mode: true
  sidebar:
    collapse-level: 1
  page-footer:
    left: |
      Course content © Dr Henry R. Neave. Reproduced with permission (May 2026).
    right: |
      Web edition by [Lee Durbin](https://leedurbin.co.nz) <span aria-hidden="true">·</span> [Source on GitHub](https://github.com/lddurbin/twelve_days_to_deming)

filters:
  - filters/reading-time.lua

format:
  html:
    theme:
      light: [cosmo, assets/styles/disable-google-fonts.scss]
      dark: [darkly, assets/styles/disable-google-fonts.scss]
    css: assets/styles/main.css
    header-includes: |
      <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net;">
      <script>
        (function () {
          try {
            if (localStorage.getItem("td:dyslexic-font") === "1") {
              document.documentElement.classList.add("dyslexic-font");
            }
          } catch (e) {}
        })();
      </script>
      <script src="/assets/scripts/reading-prefs.js"></script>
      <script>
        document.addEventListener("DOMContentLoaded", function () {
          var a = document.createElement("a");
          a.href = "#quarto-document-content";
          a.className = "skip-link";
          a.textContent = "Skip to content";
          document.body.insertBefore(a, document.body.firstChild);

          // Quarto 1.4.x emits the header search button with an empty
          // aria-label="" (fixed in later Quarto versions). Patch it here so
          // screen readers get a name until we're ready to bump the CI Quarto
          // pin across deploy.yml + accessibility.yml.
          var s = document.querySelector(".quarto-search-button");
          if (s && !s.getAttribute("aria-label")) {
            s.setAttribute("aria-label", "Search");
          }
        });
      </script>
    number-sections: false
