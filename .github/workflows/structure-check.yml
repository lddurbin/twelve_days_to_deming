name: Structure Check

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize]
    # The structure check only validates QMDs against manifests, plus the
    # images they reference and the script/workflow themselves. Narrow the
    # trigger to those paths so unrelated PRs (CSS-only, JS-only, prose
    # outside content/, etc.) don't burn CI minutes on it.
    paths:
      - 'content/**'
      - 'workflow/validation/**'
      - 'assets/images/**'
      - 'scripts/check-structure.sh'
      - '.github/workflows/structure-check.yml'
  # Merge queue: deliberately no `paths` filter here so the queue gets a
  # status report on the gh-readonly-queue/main/<sha> branch even when a
  # queued PR doesn't itself touch the structure-check input paths. Without
  # this, the queue can stall waiting for a check that the path filter
  # suppressed.
  merge_group:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

    - name: Setup Ruby
      uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af  # v1.313.0
      with:
        ruby-version: '3.2'

    - name: Run structure checks
      run: |
        overall_fail=0
        for d in $(seq 1 12); do
          echo "::group::Day $d"
          ./scripts/check-structure.sh "$d" || overall_fail=1
          echo "::endgroup::"
        done

        shopt -s nullglob
        for manifest in workflow/validation/appendix-*-manifest.yml; do
          slug=$(basename "$manifest" | sed -E 's/^appendix-(.+)-manifest\.yml$/\1/')
          echo "::group::Appendix $slug"
          ./scripts/check-structure.sh --appendix "$slug" || overall_fail=1
          echo "::endgroup::"
        done

        exit "$overall_fail"
