name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup R
      id: setup-r
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'
        
    - name: Ensure renv library directory exists
      run: mkdir -p renv/library

    - name: Cache R packages
      uses: actions/cache@v3
      with:
        path: renv/library
        key: ${{ runner.os }}-renv-${{ hashFiles('renv.lock') }}
        restore-keys: |
          ${{ runner.os }}-renv-

    - name: Setup Pandoc
      uses: r-lib/actions/setup-pandoc@v2
      
    - name: Install minimal system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libpng-dev \
          libjpeg-dev \
          libcairo2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          build-essential \
          gfortran
      
    - name: Install Quarto
      run: |
        curl -LO https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.549/quarto-1.4.549-linux-amd64.deb
        sudo dpkg -i quarto-1.4.549-linux-amd64.deb
        quarto --version
        
    - name: Pre-install digest
      run: |
        Rscript -e 'install.packages("renv", repos = "https://cran.rstudio.com")'
        Rscript -e 'source("renv/activate.R"); install.packages(c("digest", "igraph"), repos = "https://cran.rstudio.com")'
      
    - name: Restore R packages with renv
      run: |
        Rscript -e 'install.packages("renv", repos = "https://cran.rstudio.com")'
        Rscript -e 'renv::restore()'
        
    - name: Build Quarto book
      run: |
        echo "=== Building Quarto book ==="
        
        # Ensure clean environment without renv
        export RENV_PROJECT=""
        unset RENV_PROJECT
        
        # Build the book
        quarto render
        echo "Build completed successfully"
        
    - name: Verify build output
      run: |
        if [ ! -d "_book" ]; then
          echo "Error: _book directory not found after build"
          exit 1
        fi
        echo "Build verification passed"
        
    - name: Setup SSH with key verification
      run: |
        echo "=== Setting up SSH ==="
        
        # Create SSH directory
        mkdir -p ~/.ssh
        echo "SSH directory created"
        
        # Check if secret is available
        if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
          echo "ERROR: SSH_PRIVATE_KEY secret is not set or empty"
          exit 1
        fi
        
        # Write SSH key
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        echo "SSH key written"
        
        # Set permissions
        chmod 600 ~/.ssh/id_rsa
        echo "SSH key permissions set"
        
        # Verify key format
        echo "=== SSH Key Verification ==="
        echo "Key file size: $(wc -c < ~/.ssh/id_rsa) bytes"
        echo "First line: $(head -1 ~/.ssh/id_rsa)"
        echo "Last line: $(tail -1 ~/.ssh/id_rsa)"
        
        # Test key format
        if ! ssh-keygen -l -f ~/.ssh/id_rsa > /dev/null 2>&1; then
          echo "ERROR: SSH key format is invalid"
          exit 1
        fi
        echo "SSH key format is valid"
        
        # Add host to known_hosts
        ssh-keyscan -H ssh.leedurbin.co.nz >> ~/.ssh/known_hosts 2>/dev/null || echo "ssh-keyscan failed, continuing..."
        
    - name: Deploy to server
      run: |
        echo "Starting deployment to server..."
        echo "Testing SSH connection first..."
        ssh -p 18765 -o ConnectTimeout=10 -o StrictHostKeyChecking=no u197-gmrgybn3hkn2@ssh.leedurbin.co.nz "echo 'SSH test successful'" || echo "SSH test failed"
        
        echo "Attempting deployment..."
        scp -r -P 18765 _book/* u197-gmrgybn3hkn2@ssh.leedurbin.co.nz:www/deming.leedurbin.co.nz/public_html/ || echo "Deployment failed"
        echo "Deployment completed successfully"
        
    - name: Cleanup SSH
      run: |
        rm -rf ~/.ssh/id_rsa
        echo "SSH cleanup completed"
        
    - name: Deployment Summary
      run: |
        echo "✅ Build and deployment completed successfully!"
        echo "📚 Quarto book built and deployed to deming.leedurbin.co.nz"
        echo "🔄 Next deployment will occur on next push to main branch" 