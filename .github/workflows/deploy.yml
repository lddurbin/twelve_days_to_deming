name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: 'release'
        
    - name: Setup Pandoc
      uses: r-lib/actions/setup-pandoc@v2
      
    - name: Install minimal system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libpng-dev \
          libjpeg-dev \
          libcairo2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          build-essential \
          gfortran
      
    - name: Install Quarto
      run: |
        curl -LO https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.549/quarto-1.4.549-linux-amd64.deb
        sudo dpkg -i quarto-1.4.549-linux-amd64.deb
        quarto --version
        
    - name: Disable renv and install R packages
      run: |
        echo "=== Disabling renv and installing R packages ==="
        
        # Temporarily rename .Rprofile to prevent renv activation
        mv .Rprofile .Rprofile.backup
        
        # Completely disable renv
        export RENV_PROJECT=""
        unset RENV_PROJECT
        rm -rf renv/
        
        # Install all packages needed for the book
        R -e "install.packages(c('knitr', 'rmarkdown', 'ggplot2', 'dplyr', 'here', 'DiagrammeR'), repos = 'https://cran.rstudio.com/')"
        
        echo "=== Verifying package installation ==="
        R -e "library(knitr); library(rmarkdown); library(here); cat('Essential packages loaded successfully\n')"
        
    - name: Build Quarto book
      run: |
        echo "=== Building Quarto book ==="
        
        # Ensure clean environment without renv
        export RENV_PROJECT=""
        unset RENV_PROJECT
        
        # Build the book
        quarto render
        echo "Build completed successfully"
        
    - name: Restore .Rprofile
      run: |
        # Restore .Rprofile for future local development
        mv .Rprofile.backup .Rprofile
        
    - name: Verify build output
      run: |
        if [ ! -d "_book" ]; then
          echo "Error: _book directory not found after build"
          exit 1
        fi
        echo "Build verification passed"
        
    - name: Setup SSH with detailed debugging
      run: |
        echo "=== Setting up SSH ==="
        
        # Create SSH directory
        mkdir -p ~/.ssh
        echo "SSH directory created"
        
        # Check if secret is available
        if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
          echo "ERROR: SSH_PRIVATE_KEY secret is not set or empty"
          exit 1
        fi
        
        # Write SSH key
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        echo "SSH key written"
        
        # Set permissions
        chmod 600 ~/.ssh/id_rsa
        echo "SSH key permissions set"
        
        # Check key format
        echo "=== Checking SSH key format ==="
        head -1 ~/.ssh/id_rsa
        echo "Key starts with: $(head -c 20 ~/.ssh/id_rsa)"
        
        # Try ssh-keyscan with verbose output
        echo "=== Running ssh-keyscan ==="
        ssh-keyscan -v -H ssh.leedurbin.co.nz || echo "ssh-keyscan failed, continuing..."
        
        # Add host to known_hosts manually if needed
        echo "=== Adding host to known_hosts ==="
        echo "ssh.leedurbin.co.nz ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC..." >> ~/.ssh/known_hosts || echo "Manual host addition failed"
        
        # Test basic connectivity
        echo "=== Testing basic connectivity ==="
        nc -zv ssh.leedurbin.co.nz 18765 || echo "Port connectivity test failed"
        
        # Test SSH connection with verbose output
        echo "=== Testing SSH connection ==="
        ssh -v -p 18765 -o ConnectTimeout=10 -o StrictHostKeyChecking=no u197-gmrgybn3hkn2@ssh.leedurbin.co.nz "echo 'SSH connection successful'" || echo "SSH connection test failed"
        
    - name: Deploy to server
      run: |
        echo "Starting deployment to server..."
        scp -r -P 18765 _book/* u197-gmrgybn3hkn2@ssh.leedurbin.co.nz:www/deming.leedurbin.co.nz/public_html/
        echo "Deployment completed successfully"
        
    - name: Cleanup SSH
      run: |
        rm -rf ~/.ssh/id_rsa
        echo "SSH cleanup completed"
        
    - name: Deployment Summary
      run: |
        echo "✅ Build and deployment completed successfully!"
        echo "📚 Quarto book built and deployed to deming.leedurbin.co.nz"
        echo "🔄 Next deployment will occur on next push to main branch" 