name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install required system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libpng-dev \
            libjpeg-dev \
            libcairo2-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Install renv
        run: Rscript -e 'install.packages("renv", repos = "https://cran.rstudio.com")'

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: renv/library
          key: ${{ runner.os }}-renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            ${{ runner.os }}-renv-

      - name: Restore R packages with renv
        run: Rscript -e 'renv::restore()'

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install Quarto
        run: |
          curl -LO https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.549/quarto-1.4.549-linux-amd64.deb
          sudo dpkg -i quarto-1.4.549-linux-amd64.deb
          quarto --version

      - name: Build Quarto book
        run: quarto render

      - name: Setup SSH with key verification
        run: |
          echo "=== Setting up SSH ==="
          mkdir -p ~/.ssh
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: SSH_PRIVATE_KEY secret is not set or empty"
            exit 1
          fi
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ssh.leedurbin.co.nz >> ~/.ssh/known_hosts 2>/dev/null || echo "ssh-keyscan failed, continuing..."

      - name: Deploy to server
        run: |
          rsync -avz --delete -e "ssh -p 18765 -o StrictHostKeyChecking=no" _book/ u197-gmrgybn3hkn2@ssh.leedurbin.co.nz:www/deming.leedurbin.co.nz/public_html/

      - name: Cleanup SSH
        run: |
          rm -rf ~/.ssh/id_rsa
          echo "SSH cleanup completed"

      - name: Deployment Summary
        run: |
          echo "✅ Build and deployment completed successfully!"
          echo "📚 Quarto book built and deployed to deming.leedurbin.co.nz"
          echo "🔄 Next deployment will occur on next push to main branch" 