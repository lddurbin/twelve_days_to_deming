name: Build and Deploy (Current)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

jobs:
  test-js:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run JavaScript tests
      run: npm test

  build-and-deploy:
    needs: test-js
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      
    - name: Setup R
      id: setup-r
      uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590  # v2
      with:
        r-version: '4.5.1'  # Must match renv.lock R version
        
    - name: Install minimal system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libpng-dev \
          libjpeg-dev \
          libcairo2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          build-essential \
          gfortran \
          libgmp3-dev \
          libglpk-dev

    - name: Install renv
      run: Rscript -e 'install.packages("renv", version = "1.0.3", repos = "https://cran.rstudio.com")'

    - name: Ensure renv library directory exists
      run: mkdir -p renv/library

    - name: Pre-install igraph in renv library
      run: |
        R_LIBPATH="renv/library/R-$(RENV_PROJECT="" Rscript --vanilla -e 'cat(paste(R.version$major, strsplit(R.version$minor, ".", fixed=TRUE)[[1]][1], sep="."))')/x86_64-pc-linux-gnu"
        mkdir -p "$R_LIBPATH"
        Rscript -e "install.packages('igraph', lib = '$R_LIBPATH')"

    - name: Test igraph install
      run: |
        Rscript -e 'library(igraph); sessionInfo()'

    - name: Cache R packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
      with:
        path: renv/library
        key: ${{ runner.os }}-r${{ steps.setup-r.outputs.installed-r-version }}-renv-${{ hashFiles('renv.lock') }}
        restore-keys: |
          ${{ runner.os }}-r${{ steps.setup-r.outputs.installed-r-version }}-renv-

    - name: Setup Pandoc
      uses: r-lib/actions/setup-pandoc@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590  # v2
      with:
        pandoc-version: '3.1.11'  # Pinned for reproducible builds (reviewed 2026-03)
      
    - name: Install Quarto
      # Pinned to 1.4.549 — last tested version (reviewed 2026-03). Upgrade intentionally.
      run: |
        curl -LO https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.549/quarto-1.4.549-linux-amd64.deb
        sudo dpkg -i quarto-1.4.549-linux-amd64.deb
        quarto --version
        
    - name: Disable renv sandbox
      run: |
        echo 'Sys.setenv(RENV_CONFIG_SANDBOX_ENABLED = "FALSE")' >> .Rprofile

    - name: Clean renv library
      run: |
        rm -rf renv/library

    - name: Restore R packages with renv
      run: |
        Rscript -e 'renv::restore()'

    - name: Check renv status
      run: |
        Rscript -e 'renv::status()'

    - name: List installed packages in renv library
      run: |
        Rscript -e 'print(.libPaths()); print(list.files(.libPaths()[1]))'

    - name: Manually install knitr and rmarkdown if missing
      run: |
        Rscript -e 'if (!requireNamespace("knitr", quietly = TRUE) || !requireNamespace("rmarkdown", quietly = TRUE)) install.packages(c("knitr", "rmarkdown"), lib = .libPaths()[1])'
        Rscript -e 'print(.libPaths()); print(list.files(.libPaths()[1]))'

    - name: Verify renv library
      run: Rscript -e 'cat("Library path:", .libPaths()[1], "\n"); cat("Packages:", length(list.files(.libPaths()[1])), "\n")'

    - name: Run R unit tests
      run: Rscript -e 'testthat::test_dir("tests/testthat")'

    - name: Build Quarto book
      run: |
        echo "=== Building Quarto book ==="
        
        # Ensure clean environment without renv
        export RENV_PROJECT=""
        unset RENV_PROJECT
        
        # Build the book
        quarto render
        echo "Build completed successfully"
        
    # Keep in sync with deploy-optimized.yml
    - name: Smoke test build output
      run: |
        echo "Checking index.html exists..."
        test -f _book/index.html || { echo "FAIL: _book/index.html missing"; exit 1; }

        echo "Checking converted days..."
        for day_dir in content/days/day-*/; do
          day=$(basename "$day_dir" | sed 's/day-//')
          ls _book/content/days/day-${day}/*.html > /dev/null 2>&1 || { echo "FAIL: No HTML files for day-${day}"; exit 1; }
          echo "  day-${day}: OK"
        done

        echo "Smoke test passed"
        
    - name: Setup SSH with key verification
      run: |
        echo "=== Setting up SSH ==="
        
        # Create SSH directory
        mkdir -p ~/.ssh
        echo "SSH directory created"
        
        # Check if secret is available
        if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
          echo "ERROR: SSH_PRIVATE_KEY secret is not set or empty"
          exit 1
        fi
        
        # Write SSH key
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        echo "SSH key written"
        
        # Set permissions
        chmod 600 ~/.ssh/id_rsa
        echo "SSH key permissions set"
        
        # Verify key format
        # Test key format
        if ! ssh-keygen -l -f ~/.ssh/id_rsa > /dev/null 2>&1; then
          echo "ERROR: SSH key format is invalid"
          exit 1
        fi
        echo "SSH key format is valid"
        
        # Add host to known_hosts (port 18765, matching rsync's SSH)
        ssh-keyscan -p 18765 -H ssh.leedurbin.co.nz >> ~/.ssh/known_hosts 2>/dev/null
        if [ ! -s ~/.ssh/known_hosts ]; then
          echo "ERROR: ssh-keyscan failed to retrieve host key"
          exit 1
        fi
        echo "Host key added to known_hosts"

    # Keep in sync with deploy-optimized.yml
    - name: Backup current deployment
      run: |
        DEPLOY_PATH="www/deming.leedurbin.co.nz/public_html"
        BACKUP_DIR="www/deming.leedurbin.co.nz/backups"
        SSH_CMD="ssh -p 18765 u197-gmrgybn3hkn2@ssh.leedurbin.co.nz"

        echo "Creating pre-deploy backup..."
        $SSH_CMD "mkdir -p ${BACKUP_DIR} && \
          if [ -d ${DEPLOY_PATH} ]; then \
            cp -r ${DEPLOY_PATH} ${BACKUP_DIR}/public_html.backup.\$(date +%Y%m%d%H%M%S) && \
            cd ${BACKUP_DIR} && ls -1d public_html.backup.* 2>/dev/null | sort | head -n -5 | xargs -r rm -rf; \
          else \
            echo 'No existing deployment found, skipping backup'; \
          fi"
        echo "Backup complete"

    - name: Deploy to server
      run: |
        set -e
        echo "Starting rsync deployment..."
        rsync -avz --delete -e "ssh -p 18765" _book/ u197-gmrgybn3hkn2@ssh.leedurbin.co.nz:www/deming.leedurbin.co.nz/public_html/
        echo "Deployment completed successfully"
        
    - name: Cleanup SSH
      run: |
        rm -rf ~/.ssh/id_rsa
        echo "SSH cleanup completed"
        
    - name: Deployment Summary
      run: |
        echo "✅ Build and deployment completed successfully!"
        echo "📚 Quarto book built and deployed to deming.leedurbin.co.nz"
        echo "🔄 Next deployment will occur on next push to main branch" 