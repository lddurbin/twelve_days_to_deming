name: Build and Deploy

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Opt r-lib/actions into Node 24 ahead of the Sept 2026 Node 20 removal.
# Remove once r-lib publishes a v3 tag that runs on Node 24 natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-js:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run JavaScript tests
      run: npm test

  build-and-deploy:
    needs: test-js
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Setup R
      id: setup-r
      uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590  # v2
      with:
        r-version: '4.5.1'
        use-public-rspm: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libpng-dev \
          libjpeg-dev \
          libcairo2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          build-essential \
          gfortran \
          libgmp3-dev \
          libglpk-dev

    - name: Setup Pandoc
      uses: r-lib/actions/setup-pandoc@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590  # v2
      with:
        pandoc-version: '3.1.11'

    - name: Cache Quarto installation
      id: cache-quarto
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: /opt/quarto
        key: quarto-1.4.549

    - name: Install Quarto
      if: steps.cache-quarto.outputs.cache-hit != 'true'
      run: |
        curl -LO https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.549/quarto-1.4.549-linux-amd64.deb
        sudo dpkg -i quarto-1.4.549-linux-amd64.deb

    - name: Add Quarto to PATH
      run: echo "/opt/quarto/bin" >> $GITHUB_PATH

    - name: Cache R packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/R/renv
        key: ${{ runner.os }}-r${{ steps.setup-r.outputs.installed-r-version }}-renv-${{ hashFiles('renv.lock') }}
        restore-keys: ${{ runner.os }}-r${{ steps.setup-r.outputs.installed-r-version }}-renv-

    - name: Restore R packages
      shell: Rscript {0}
      run: |
        if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv", version = "1.0.3")
        renv::restore()

    - name: Run R unit tests
      run: Rscript -e 'testthat::test_dir("tests/testthat")'

    - name: Cache Quarto freeze outputs
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: _freeze
        key: ${{ runner.os }}-freeze-${{ hashFiles('renv.lock') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-freeze-${{ hashFiles('renv.lock') }}-
          ${{ runner.os }}-freeze-

    - name: Build Quarto book
      run: quarto render

    - name: Smoke test build output
      run: |
        echo "Checking index.html exists..."
        test -f _book/index.html || { echo "FAIL: _book/index.html missing"; exit 1; }

        HTML_COUNT=$(find _book -name "*.html" | wc -l)
        echo "Found $HTML_COUNT HTML files"
        # Prevents rsync --delete from wiping production on partial builds
        if [ "$HTML_COUNT" -lt 10 ]; then
          echo "FAIL: Build produced fewer than 10 HTML files — aborting deploy"
          exit 1
        fi

        echo "Checking converted days..."
        for day_dir in content/days/day-*/; do
          day=$(basename "$day_dir" | sed 's/day-//')
          ls _book/content/days/day-${day}/*.html > /dev/null 2>&1 || { echo "FAIL: No HTML files for day-${day}"; exit 1; }
          echo "  day-${day}: OK"
        done

        echo "Smoke test passed"

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p 18765 -H ssh.leedurbin.co.nz >> ~/.ssh/known_hosts 2>/dev/null
        if [ ! -s ~/.ssh/known_hosts ]; then
          echo "ERROR: ssh-keyscan failed to retrieve host key"
          exit 1
        fi

    - name: Backup current deployment
      run: |
        DEPLOY_PATH="www/deming.leedurbin.co.nz/public_html"
        BACKUP_DIR="www/deming.leedurbin.co.nz/backups"
        SSH_CMD="ssh -p 18765 u197-gmrgybn3hkn2@ssh.leedurbin.co.nz"

        echo "Creating pre-deploy backup..."
        $SSH_CMD "mkdir -p ${BACKUP_DIR} && \
          if [ -d ${DEPLOY_PATH} ]; then \
            cp -r ${DEPLOY_PATH} ${BACKUP_DIR}/public_html.backup.\$(date +%Y%m%d%H%M%S) && \
            cd ${BACKUP_DIR} && ls -1d public_html.backup.* 2>/dev/null | sort | head -n -5 | xargs -r rm -rf; \
          else \
            echo 'No existing deployment found, skipping backup'; \
          fi"
        echo "Backup complete"

    - name: Deploy to server
      run: |
        rsync -avz --delete -e "ssh -p 18765" _book/ u197-gmrgybn3hkn2@ssh.leedurbin.co.nz:www/deming.leedurbin.co.nz/public_html/

    - name: Tag deployment
      run: |
        git tag "deploy-$(date +%Y%m%d%H%M%S)"
        git push --tags

    - name: Cleanup SSH
      if: always()
      run: rm -f ~/.ssh/id_rsa
