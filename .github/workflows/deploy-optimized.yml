name: Build and Deploy (Optimized)

on:
  workflow_dispatch:
    inputs:
      test_run:
        description: 'Testing optimized workflow'
        required: false
        default: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: Setup R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.4.0'  # Must match renv.lock R version
        use-public-rspm: true
        
    - name: Cache system dependencies
      id: cache-sys-deps
      uses: actions/cache@v4
      with:
        path: /var/cache/apt
        key: ${{ runner.os }}-sys-deps-v1
        
    - name: Install system dependencies
      if: steps.cache-sys-deps.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libpng-dev \
          libjpeg-dev \
          libcairo2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          build-essential \
          gfortran \
          libgmp3-dev \
          libglpk-dev

    - name: Setup Pandoc
      uses: r-lib/actions/setup-pandoc@v2
      with:
        pandoc-version: '3.1.11'  # Pinned for reproducible builds
      
    - name: Cache Quarto installation
      id: cache-quarto
      uses: actions/cache@v4
      with:
        path: /opt/quarto
        key: quarto-1.4.549
        
    - name: Install Quarto
      # Pinned to 1.4.549 — last tested version. Upgrade intentionally, not automatically.
      if: steps.cache-quarto.outputs.cache-hit != 'true'
      run: |
        curl -LO https://github.com/quarto-dev/quarto-cli/releases/download/v1.4.549/quarto-1.4.549-linux-amd64.deb
        sudo dpkg -i quarto-1.4.549-linux-amd64.deb
        
    - name: Add Quarto to PATH
      run: echo "/opt/quarto/bin" >> $GITHUB_PATH

    - name: Cache R packages
      uses: actions/cache@v4
      with:
        path: ~/.local/share/renv
        key: ${{ runner.os }}-r4.4.0-renv-${{ hashFiles('renv.lock') }}
        restore-keys: ${{ runner.os }}-r4.4.0-renv-

    - name: Restore R packages
      shell: Rscript {0}
      run: |
        if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
        renv::restore()
        
    - name: Build Quarto book
      run: quarto render

    # Keep in sync with deploy.yml
    - name: Smoke test build output
      run: |
        echo "Checking index.html exists..."
        test -f _book/index.html || { echo "FAIL: _book/index.html missing"; exit 1; }

        echo "Checking converted days..."
        for day_dir in content/days/day-*/; do
          day=$(basename "$day_dir" | sed 's/day-//')
          ls _book/content/days/day-${day}/*.html > /dev/null 2>&1 || { echo "FAIL: No HTML files for day-${day}"; exit 1; }
          echo "  day-${day}: OK"
        done

        echo "Smoke test passed"

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p 18765 -H ssh.leedurbin.co.nz >> ~/.ssh/known_hosts 2>/dev/null
        if [ ! -s ~/.ssh/known_hosts ]; then
          echo "ERROR: ssh-keyscan failed to retrieve host key"
          exit 1
        fi
        
    # Keep in sync with deploy.yml
    - name: Backup current deployment
      run: |
        DEPLOY_PATH="www/deming.leedurbin.co.nz/public_html"
        BACKUP_DIR="www/deming.leedurbin.co.nz/backups"
        SSH_CMD="ssh -p 18765 u197-gmrgybn3hkn2@ssh.leedurbin.co.nz"

        echo "Creating pre-deploy backup..."
        $SSH_CMD "mkdir -p ${BACKUP_DIR} && \
          if [ -d ${DEPLOY_PATH} ]; then \
            cp -r ${DEPLOY_PATH} ${BACKUP_DIR}/public_html.backup.\$(date +%Y%m%d%H%M%S) && \
            cd ${BACKUP_DIR} && ls -1d public_html.backup.* 2>/dev/null | sort | head -n -5 | xargs -r rm -rf; \
          else \
            echo 'No existing deployment found, skipping backup'; \
          fi"
        echo "Backup complete"

    - name: Deploy to server
      run: |
        rsync -avz --delete -e "ssh -p 18765" _book/ u197-gmrgybn3hkn2@ssh.leedurbin.co.nz:www/deming.leedurbin.co.nz/public_html/
        
    - name: Cleanup
      if: always()
      run: rm -f ~/.ssh/id_rsa