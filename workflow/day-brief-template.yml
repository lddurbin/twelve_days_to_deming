  # context_notes: |
  #   The funnel experiment requires dice — add a preparatory note.
  #   Page 19 has a table that was corrected in a later edition:
  #   the value in row 3, column 2 should be 4.7, not 4.2.
  #   Cross-reference Day 2 page 15 when the control chart is mentioned.
