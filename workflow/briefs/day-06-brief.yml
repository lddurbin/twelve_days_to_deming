  5 Deadly Diseases. Workbook page 96.

  Activity 6-b (pages 22-25/doc pp 18-21): Score Gallery Furniture Pre-Deming and Post-Deming
  on the same 14 Points and 5 Deadly Diseases. Compare with own organisation scores from 6-a.
  Workbook pages 97-110 for the Gallery Furniture story, separate scoring table on page 23.

  No formal out-of-hours work for this day (mentioned explicitly on page 5).

  Approvals: Telegraph extracts (page 23/Stafford Hospital) and BBC transcript (page 25/
  Bernard Jenkin interview) included with permission.

  The Deming quote on page 20 ("I'm doing this because I have a responsibility to make a
  difference.") is a powerful moment — should use deming_quote CSS class with emphasis.

