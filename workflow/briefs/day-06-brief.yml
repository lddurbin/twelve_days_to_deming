context_notes: |
  Schedule from page 3:
  - 9:00 Approx start / introduction
  - Activity 6-a (scoring own organisation)
  - Major Activity: The Gallery Furniture story (pages 3-16)
  - Major Activity 6-b (scoring Gallery Furniture)
