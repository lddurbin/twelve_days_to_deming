  Key themes: Real-world case studies illustrating Deming principles. Gallery Furniture is
  the centrepiece — a detailed transformation story. The "More true stories" section provides
  shorter examples of targets, quotas, rankings, and gaming across healthcare, policing,
  education, and business.

