      adjustment anecdote. Copyright-note-style remark.

      Page 21 (PDF 25): Little boy dialog concluded ("Now it's too
      deep!"). **Rule 4 ("wandering")** bullet list:
        - Matching colour by saving the last swatch
        - Adjustment of meeting time based on last actual start time
        - Copy examples. Learn by example with no theory.
        - Hanging wallpaper
        - If part does not fit gauge, fit gauge to part
        - Reacting to rumour
        - The man who blew the mill whistle sets his watch by the
          jeweller's clock on the way to work. The jeweller goes
          by the mill whistle.
        - Interpretation of a law based on precedence
        - Getting together to share ideas
        - Changing company policy based on the last attitude survey
      "Finally, see the bottom of Day 3 page 58."

      Anchors `{#sec-page14}` through `{#sec-page21}` — page 15
