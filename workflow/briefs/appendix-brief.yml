      197-200 / Day 11 pages 18-21.

      Page 42 (PDF 46): **ACTIVITY 11–b** — links with Knowledge
      of Psychology. Points 1 and 5 and the third Deadly Disease
      connected with genuine, sustained, substantial improvement,
      and most certainly is what the Deming Cycle is for. References
      Plan-Do-Study-Act cycle as "specifically referred to in
      Deming's words in Part C, you still do not have to look very
      hard to find it". Humanitarian approach to "All One Team"
      effective item 7 of Part C in particular. Return to Workbook
      pages 211-214 / Day 11 pages 32-35.

      FIGURES:
        - **Second Project Continued banner** on page 41 — crop
          from PDF 45 as second-project-continued-banner.png.
          NOTE: Day 11 already has this banner at
          assets/images/day-11/second-project-continued-banner.png
          (see day-11-brief.yml). Check whether to reuse that path
          or re-crop for an appendix-specific copy.

      Anchors `{#sec-page41}` (Day 11 §05) and `{#sec-page42}`
      (Day 11 §07).

  - slug: "10-optional-extras"
    title: "OPTIONAL EXTRAS — \"SIX-SIGMA\" SUPERSTITIONS"
    pages: "43-51"
    pdf_pages: "47-55"
    notes: |
      Nine-page chapter containing the Optional Extras requested by
      Balaji Reddie. The Optional Extras are a rewrite of the sixth
      of the eight articles Neave drafted around 20 years earlier
      (series SPC—Back to the Future), condensed to what has most
      relevance to readers of the other articles and parts of the
      "Optional Extras" Part D.

      Page 43 (PDF 47): **OPTIONAL EXTRAS** header.
      **(BY REQUEST OF BALAJI REDDIE ...)** sub-title.
      **Introduction** section. Normal-distribution bell-curve
      illustration (small inline image). References to Day 3 and
      Day 7's Major Activity, "bell-shaped curve" and "not at all
      unusual for a histogram formed from some process-data to
      have a shape roughly approximating the shape of a normal
      distribution".

      Page 44 (PDF 48): Continued Introduction — absolutely any
      number may appear in the data, tails of the distribution,
      normal distribution assumed to be centred on the process
      average, standard deviation σ (sigma), Greek letter μ (mu).
      Reference to "six-sigma" quality as conformance to
      specifications.

      Page 45 (PDF 49): **"SIX-SIGMA" SUPERSTITIONS** header.
      Story of Motorola's six-sigma programme. Definitions of σ,
      UCL, LCL, USL, LSL. Tolerance concept. Chart of a situation
      that is definitely NOT six-sigma quality (process needing σ
      to change / improve). Discussion of "near-optimal" process.
      FIGURE: Chart showing process with USL/LSL and UCL/LCL (red
      zigzag line between them) → crop from PDF 49 as
      six-sigma-capable.png.

      Page 46 (PDF 50): Continued — barely-capable process chart
      showing σ reduced. **Superstition no. 3: 3.4 parts per
      million**. Long discussion of the claim; mathematical world
      vs real world. Reference to histogram explaining why Mathematical
      Statisticians are so fond of it.
      FIGURE: Chart showing barely-capable six-sigma process
      → crop from PDF 50 as six-sigma-barely-capable.png.

      Page 47 (PDF 51): **Tail Probabilities in the Normal
      Distribution** table — three-column table showing standard
      deviation offsets (left-hand and right-hand tails, area
      probability). Rows: μ − 2.5σ through μ + 6.0σ in half-sigma
      steps. The famous 3.4 parts per million figure appears at
      μ + 4.5σ (area 0.0000030 when centred, 0.0000034 when shifted
      by 1.5σ). Extensive discussion about how distant 3.4 parts
      per million figure is and how practical it is in real-world
      manufacturing.
      FIGURE: Tail Probabilities table → crop from PDF 51 as
      tail-probabilities-table.png.

      Page 48 (PDF 52): **An Alternative "Truth"** — My great friend
      Don Wheeler (from whom I've learned so much over the years)
      told me about a family of probability distributions that was
      studied by Irving W Burr. Normal vs Burr distributions
      comparison with μ = 0 and σ = 1 (fictional "standardised"
      versions). 312 parts per million for Burr distribution's
      non-symmetric version. Neave argues this is truly a useful
      message rather than strict Mathematical pedantry.
      FIGURE: Normal vs Burr distributions comparison chart → crop
      from PDF 52 as normal-vs-burr.png.

      Page 49 (PDF 53): **Superstitions** — damaging superstitions
      general discussion. Tightening specifications doesn't solve
      the problem. Football / training example.
      **Wise Words from Mr Don Wheeler** — quoted in-block:
      "The total conformance to specifications is no longer enough.
      Rather that specifications are a compromise created when we
      could do no better. Now that we can do better, those who are
      content to live with the compromises of the past will only
      become increasingly noncompetitive."
      **A Better Way** — "better description of the world is the
      Taguchi loss function" (Deming, Out of the Crisis page 120
      [141]). What's that when it's at home?! Basically it's the
      rather reasonable hypothesis that the best is ideal and that,
      the further away from the ideal you get, the worse off you
      are, in fact, the more rapidly things get worse. Reference
      to Day 7 Pause for Thought 7-f (see Day 7 pages 20-23).

      Page 50 (PDF 54): Continued — "better description of the world"
      was described by Genichi Taguchi at a famous meeting in Tokyo
      in 1960 at which Dr Deming was present. **A (useful) Mathematical
      Footnote** — σ² + (non-centredness)² formula showing how
      Taguchi's study of "loss" leads to non-centredness. Notes on
      experience and six-sigma enthusiasts. Return to Contributions
      from Balaji Reddie page 33.

      Page 51 (PDF 55): **Approvals, Acknowledgments and Information**
      — footnote ᵃ (page 10): "This quotation from the Deming A5
      Booklet W2 (formally BDA Booklet W2) has been reproduced with
      the approval of the Deming Transformation Forum."

      FIGURES (four crops total):
        - Page 45: Six-Sigma capable process chart
        - Page 46: Six-Sigma barely-capable chart
        - Page 47: Tail Probabilities table (multi-column table)
        - Page 48: Normal vs Burr comparison chart

      Anchors `{#sec-page43}` through `{#sec-page51}` — not
      currently cross-referenced from any Day, but include them
      all for completeness.

      This is a self-contained section with no embedded interactive
      elements — purely expository.

