  - slug: "03-day-3"
    title: "DAY 3 — FUNNEL EXPERIMENT SIMULATIONS & RULES"
    pages: "14-21"
    pdf_pages: "18-25"
    notes: |
      Eight-page chapter — the most figure-heavy of the Day chapters.
