  - slug: "01-day-1"
    title: "DAY 1 — DISCUSSION ON THE FIRST PARADOX"
    pages: "2-6"
    pdf_pages: "6-10"
    notes: |
      Five pages of Neave's discussion backing the First Paradox
      from Day 1's "Springboard" article.

      Page 2 (PDF 6): "DAY 1" header; "DISCUSSION ON THE FIRST
      PARADOX". Extended essay on Shewhart's "3σ-limits",
      statistical control, SPC confusion, and the term "one-at-a-
      time" data. References to Understanding Variation.

      Page 3 (PDF 7): Continues the discussion — Shewhart, Nashua's
      Statistical Process Control course, autobiographical note on
      Neave's first statistics teaching at Nottingham. References
      Dr Deming's Out of the Crisis Chapter 11.

      Page 4 (PDF 8): Definitions of statistical control, "special
      cause" vs "common cause", contrasting definitions with the
      orthodox Mathematical Statistician position. Footnote on
      Shewhart's 1924 rules (published 1931). References Out of
      the Crisis page 277 for Dr Deming's defined criterion.

      Page 5 (PDF 9): Discussion about Mathematical Statisticians
      and why most find this hard. Rhetorical "good exercise for the
      statisticians — all others should skip this small-print
      section". Statistical-control-is-an-acceptable-economic-value
      quotation (Deming).

      Page 6 (PDF 10): **PAUSE FOR THOUGHT 1–c** commentary —
      explains why Deming/Shewhart definitions differ from
      mathematicians'; why statisticians' probability theory misleads.
      Followed by **MAJOR ACTIVITY 1–f** commentary — brief notes on
      acceptable targets, "last" at Day 1's end.

      Place `{#sec-page2}` through `{#sec-page6}` anchors — page 6
      especially important (Day 1 §07 links directly to it).

      No figures. Interactive-element references mentioned in prose
      but implemented only on the Day pages themselves.

  - slug: "02-day-2"
