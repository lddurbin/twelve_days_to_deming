      text about LCL/UCL context — brief mention of Foreman + Willing
      Workers. Return-to-Workbook notes for each.

      Page 8 (PDF 12): **ACTIVITY 2–f** tabular answers:
        - Day 1 (Ernie, John, Carol, Ben, Ed)
        - Day 2 (Audrey, John, Al, Carol, Ben, Mr T's "68?" comment)
        - Day 3 (Audrey, John, Al, Ed, To them all)
        - Day 4 (Audrey, John, Al, Carol, Ben, Ed)
      Tabular / aligned columns ("Name: quip").
      **ACTIVITY 2–g** — control-limit reference values for
      Statisticians' data and Spaniards' data.

      Page 9 (PDF 13): **TECHNICAL AID 4** — bordered box titled
      "Statisticians' data" and "Spaniards' data" with control-limit
      formulas:
        - x̄ = 203 ÷ 24 = 8.458
        - R̄ = 1 − p̄ = 0.1692
        - x̄(1 − p̄) = 8.458 × 0.8308 = 7.0269064, and √7.0269064 = 2.6508
        - UCL/LCL formulas for both datasets
      FIGURE: crop the bordered Technical Aid 4 box (spans full page).

      Page 10 (PDF 14): **MAJOR ACTIVITY 2–h** discussion —
      common-cause variation is larger than expected. Three paragraphs
      on ownership of the process, tampering.

      Page 11 (PDF 15): "Financial information", "The big message",
      "Mechanical vs random sampling" sections. Long paragraph on
      profound messages in Red Beads Experiment; paddle-size exercise;
      reference to "3 or 30 years, shows an average of 11.3"; paddle
      No. 2 over-many-experiments discussion; paddle No. 1 experiment
      summary. Footnote-style call-out.

      Page 12 (PDF 16): Continues sampling / paddle discussion.
      Bottom half: **Dave Kerr's "Wrap-Up Brief" following the
      Red Beads Experiment** begins. Bulleted list:
        - To "lift our gaze up" and see the wider system
        - To understand something about how we behave in organisations

      Page 13 (PDF 17): Dave Kerr's Wrap-Up Brief continues:
        - A practical and effective method for helping us really learn
        - To understand how we behave in organisations
      Four interdependent needs framed as a "system of thinking and
      seeing". Example using Red Beads company. Finally the role of
      leading. Return-to-Day-2-page-43 close.

      Anchors `{#sec-page7}` through `{#sec-page13}` — especially
