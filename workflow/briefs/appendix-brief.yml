  CROSS-REFERENCES (summary — see section_anchors for the full
  list):
    - 30+ inbound references from Days 1–11 rely on Appendix page
      anchors being exactly `sec-pageN` where N is the printed
      Appendix page number (1–51).
    - Existing inline page-number mentions in Days' prose
      ("Appendix page N") are NOT hot-links today. They become hot
      after conversion if we add matching anchors — which is one
      of issue #132's acceptance criteria.

  CONVENTIONS:
    - Neave text is rendered as standard prose (no special styling).
    - Pause for Thought / Activity commentary blocks are regular
      paragraphs, not the interactive `viewof` inputs (those live
      on the Day pages, not the Appendix). Headers like
      "PAUSE FOR THOUGHT 1-c" become `### PAUSE FOR THOUGHT 1–c`.
    - Bullet lists preserve the original `•` bullets as markdown
      `-` or `*` lists.
    - Back-references like "(Return to Workbook page X / Day Y
      page Z.)" render as italic paragraphs, mirroring Day style.

  DAYS WITHOUT APPENDIX CONTENT:
    - Day 6, Day 8, Day 12 have em-dashes in the TOC — no chapters
      created for them. Days' own text will not have cross-
      references to Appendix for these days.

  FRONT MATTER:
    - PDF pages 1-4 (cover "P", blank, TOC, blank) are NOT converted
      to QMD. The title + TOC will be handled automatically by
      Quarto (the book structure itself shows a sidebar).

  NAMING:
    - Files live at `content/appendix/NN-slug.qmd` (not under
      `content/days/`).
    - Image crops live at `assets/images/appendix/` — create this
      directory as part of Phase 3.

  TESTING:
