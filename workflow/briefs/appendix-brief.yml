      variation (including consequences for resulting service and
      product). References to Design of Experiments, Analysis of
      Variance, stats-level 3.

      Page 15 (PDF 19): **ACTIVITY 3–g** — first-12 calculation
      showing x̄ = 192 ÷ 12 = 16.00, numbers in italics, values
      separated. Formula for MR̄ = 2.66 × MR = 2.66 × 1.00 = 2.66.
      Commentary on control limits. **MAJOR ACTIVITY 3–h** intro:
      computer simulation of the Funnel Experiment — Simulation A
      and Simulation B run charts for Rule 2 and Rule 1.
      FIGURES: Simulation A Rule 2 chart, Simulation B Rule 2 chart,
      Simulation A Rule 1 chart, Simulation B Rule 1 chart — crop
      all four run-charts from page 15.

      Page 16 (PDF 20): Continuation of simulation discussion.
      Simulation A vs Simulation B for Rule 3 (zig-zags). Second set
      of charts showing Rule 3 behaviour — upward drift discussion.
      FIGURES: Simulation A Rule 3 chart and Simulation B Rule 3
      chart. Run chart for Rule 4 begins — upward drift in simulation B.

      Page 17 (PDF 21): Rule 3 and Rule 4 continued. Commentary on
      Rule 4 rearward drift ("wanders around"); mathematical tie-in
      to "random walk". Simulation B Rule 4 chart.
      FIGURE: Simulation B Rule 4 chart.

      Page 18 (PDF 22): **ACTIVITY 3–i** — three-paragraph
      examination of Rule 3 catastrophe behaviour; tampering parallel
      with Red Beads Experiment; reference to "stupidly simple" and
