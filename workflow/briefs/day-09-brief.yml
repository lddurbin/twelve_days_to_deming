# ------ Context Notes ------
context_notes: |
  Schedule from page 3 (approximate):
  - 9:00am-12:45pm; 1:45pm-5:45pm
  - Introduction (p 1); A SYSTEM ... (p 2); What ignited Japan? (p 3)
  - The "Old Way" and the "New Way" (p 3) — Pauses 9-a and 9-b
  - "A dynamic scientific process of acquiring knowledge" (p 5)
  - Activity 9-c (p 7 [WB 142])
  - Organisation charts — vertical or horizontal? (p 7) — Pause 9-d
  - Where's the fault? (p 9); Some notes from friends (p 10)
  - Major Activity 9-e (p 11 [WB 144]); Stages 1-5 (pp 12-15)
  - ... OF PROFOUND KNOWLEDGE; Our "12 Days" — what's left? (p 16)
  - Development of "Profound Knowledge"; Sources of learning (p 17)
  - Guidance for the Second Project (Days 10 and 11) (p 18)
  - Introductions to the System of Profound Knowledge (p 21)
  - "Out-of-hours" preparation for the Second Project (p 26)
  - "Out-of-hours" note (p 30)

  Key themes: Day 9 marks the transition from the practical "New Climate"
  topics (Day 8) to the theoretical foundations of Deming's teaching.
  The morning builds the concept of a system — starting from Shewhart's
  Old Way/New Way distinction (line vs circle), progressing through the
  dynamic scientific process (the helix), and culminating in the Major
  Activity where participants construct their own organisational flow
  diagram. The afternoon introduces the System of Profound Knowledge
  (SoPK) — the theoretical framework that ties together everything
  taught so far — and prepares students for the Second Project on
  Days 10-11.

  This is a heavily text-based day with fewer interactive elements than
  Days 7-8. Only 3 Pauses for Thought (all with commentary), 1 Activity
  (text input), and 1 Major Activity (5-stage flow diagram construction).
  The Major Activity stages each have large blank workspace areas that
  will become textarea inputs.

  The afternoon is almost entirely reading/reference material — guidance
  for the Second Project, four introductions to the SoPK (Scholtes
  diagram, DemDim Chapter 18, Balaji's articles, Deming's May 1990
  version), and preparation instructions.

  The Deming SoPK text on pages 24-25 is rendered in blue in the
  original — this should use the deming_quote class or similar
  blue styling.

  DemDim references:
  - Chapter 8 "Processes and Systems" (mentioned but not primary reading)
  - Chapter 18 "Appreciation for a System" (main reference, rewritten)
  - Chapter 15 connections (from Day 8)
  - The New Economics Chapter 3 "Introduction to a System"
  - The New Economics Chapter 4 "A System of Profound Knowledge"
  - Out of the Crisis pages 154-155/180-181 (Deming's Figure 9)
