  - slug: "epilogue"
    title: "SECTION 7: EPILOGUE"
    pages: "42-43"
    notes: |
      PNG 046-047 (plus blank PNG 048). Closing of the entire course.
      Extract from the soundtrack near the end of The Deming of
      America. Priscilla Petty interviews Dr Deming about the medal
      he received from the Emperor of Japan.

      Page 42 (PNG 046): Section 7 heading. Dialogue script format
      (Priscilla Petty / Narrator / Dr Deming). Background: in 1960
      the Prime Minister of Japan, on behalf of Emperor Hirohito,
      awarded Deming Japan's Second Order Medal of the Sacred
      Treasure. PHOTO of the medal in the middle of the page.
      Dialogue:
        P P: How did you feel when he gave that to you?
        Dr Deming: Oh, totally unworthy.
        P P: You felt unworthy?
        Dr D: Yes.
        P P: Why?
        Dr D: Oh, it was a matter of luck.
      Narrator commentary on the cultural paradox — Deming a hero
      in Japan, unknown in the United States.
        P P: I asked about another medal from our President.
        Dr D: Well, the medal from the President of the United States
              came 28 years after the medal from the Emperor of Japan.

      FIGURE: crop the medal photo from page 42.

      Page 43 (PNG 047): Epilogue closes. "28 years after..."
      meditation. "Better late than never" — "I have done my best."
      as the closing line (display as centred bold — matches
      major-principle formatting).
      Final clock glyph in bottom-right of page 43.

      Page 44 (PNG 048): Blank / end of Day 12.

      IMPLEMENTATION: Use .foreman-remark-style dialogue styling OR
      a similar speaker-tagged prose treatment — check existing days
      (the Red Beads foreman dialogue pattern may work, but this is
      an interview, not a call-and-response). If no suitable class
      exists, render as speaker: italic quoted text with a left
      indent via plain markdown blockquotes.

      Close the chapter (and therefore the book) with the centred
      bold line "I have done my best." — ideally inside a styled
      block (e.g. .deming_quote with text-align:center if the
      existing class supports it).

