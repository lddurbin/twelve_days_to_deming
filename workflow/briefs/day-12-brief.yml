      Directives observed:
        Staff (pages 14-18):
          p.14: "Encourage and help your staff to get involved with this stuff."
          p.15: "You are familiar with Deming's "Organisation Viewed
                 as a System" flow diagram..." (extended italic
                 instruction — a reflection prompt about mapping
                 your own system).
          p.16: Quoting Deming "A system must have an aim..."
                discussion of 'system measure(s)', references to
                control charts and Day 9 page 27; extended italic
                reflection on unknown/unknowable figures (Out of
                the Crisis Diseases 2-3).
          p.17: "When you have identified your internal customer(s),
                talk to them. Ask them:
                - What do you need from me?
                - What do you do with what I give you?
                - Is there anything you need from me that I am not
                  giving you?"
                Later: "Are there any people in your organisation
                whom you perceive to be your competitors? Given what
                you have learned..." (reflection prompt).
          p.18: "Identify what power to act you possess..." (power
                to act; involving your manager; care not to threaten
                them).

        Middle Managers (pages 19-21):
          p.19: GUIDANCE FOR MIDDLE MANAGERS heading; italic context
                paragraph. Directive: "Encourage and help your staff
                to get involved with this stuff." Later: "Set up a
                study programme for your staff, wherever they are in
                the organisation."
          p.20: "Give them time to study." (large whitespace) "Give
                them time and support to apply what they have learned."
          p.21: "Institute a regime / culture of continual improvement
                by your staff, throughout the organisation." (large
                whitespace) "If you want this stuff to work in your
                organisation, you will need to make a serious
                commitment in time and resources to it." (Clock at
