      keep the directives as short sections separated by normal
      paragraph breaks. Italic/context paragraphs (e.g. the
      Guidance-for-Middle-Managers preface) should use .neave_note.
      A single clock appears at PNG 025 (printed page 21) — include.

  - slug: "leadership-for-the-transformation"
    title: "SECTION 4: LEADERSHIP FOR THE TRANSFORMATION"
    pages: "22-29"
    notes: |
      PNG 026-033. Section 4 introduction plus "Modern Principles of
      Leadership" — a numbered 14-item list (numbered 1-14, 2 per
      printed page across pages 23-29). Items are in BLUE text.

      Page 22 (PNG 026): Section 4 heading. Intro paragraphs —
      recalls Day 5 "Attributes of a Leader" (DemDim page 335),
      Out of the Crisis pages 99-101/116-118. The extended list that
      follows is Dr Deming's later "suggestions" for genuine
      leadership. Notes that participants should read-through and
      highlight first, then revisit for Activity 12-d.

      Callout on page 23: "Pages 23-33 are also on Workbook pages
      228-234."

      Pages 23-29 (PNGs 027-033): Fourteen principles, two per page,
      all in BLUE text. Each principle has a heading bullet + one or
      more sub-bullets. Transcribe verbatim with .deming_quote
      styling OR a dedicated blue-principles class — spot-check Day
      5 for the existing convention.

      Principles (from source):
        1. Institute education in leadership: obligations, principles, and methods.
        2. Ensure more careful selection of people in the first place.
        3. After selection, ensure better training and education.
           - A leader encourages his people to study.
           - He tries to optimise the education, skills, and abilities of everyone to improve.
           - He provides, when possible and feasible, seminars and courses for advancement of learning.
           - He encourages continued education in college or university for people that are so inclined.
        4. A leader understands that all people are different from each other.
           - He creates trust. He is aware that creation of trust requires that he take a risk.
           - He tries to create for everybody interest and challenge, and joy in work.
        5. He creates freedom and innovation.
           - Improvement and innovation are his aim.
        6. A leader is coach and counsel, not a judge.
           - Instead of being a judge, he will be a colleague, counselling and leading the people on a day-to-day basis, learning from them and with them.
        7. A leader is an unceasing learner.
           - He listens and learns without passing judgment on him that he listens to.
           - He does not expect perfection.
        8. A leader will discover who if any of his people is (a) outside the system on the good side, (b) outside the system on the poor side, (c) belonging to the system. If numbers are used for measures of performance, the calculations required (i.e. of control limits) are fairly simple.
           - Monetary reward for outstanding performance outside the system, without other more satisfactory recognition, may be counterproductive.
           - People that are on the poor side of the system will require special help. Simple rearrangement of the work might be the answer.
        9. Ranking of people (outstanding down to unsatisfactory) that belong to the system violates scientific logic and is ruinous as a policy.
           - The people of a group that form a system will all be subject to the company's formula for raises in pay. This formula may involve (e.g.) seniority. It will not depend on rank within the group, as the people within the system will not be ranked No. 1, No. 2, ... No. last. (In bad times, there may be no raise for anybody.)
           - The day is here when anybody deprived of a raise or any privilege through misuse of figures for performance (as by ranking the people in a group) may with justice file a grievance. [I certainly hope that our legal system encouraged this.]
       10. Figures on performance should be used not to rank the people in a group that fall within the system, but to assist the leader to accomplish improvement of the system.
           - A leader will study results with the aim to improve his work.
           - These figures may also point out to him some of his own weaknesses.
       11. In the absence of numerical data, a leader must make subjective judgment.
           - He will hold a long interview with every one of his people, three or four hours, at least once a year, not for criticism, but for help and understanding on the part of everybody. They will know what kind of help they need.
           - There will sometimes be incontrovertible evidence of excellent performance, such as patents, publication of papers, invitations to give lectures.
       12. A leader has three sources of power: (1) Formal; (2) Knowledge; (3) Personality.
           - A successful leader develops (2) and (3); does not rely on (1). He has nevertheless obligation to use (1), as this source of power enables him to change the system — equipment, material, methods — to bring improvement, such as to reduce variation in output.
           - He understands a stable system. What to do about mistakes and failures of people, how to help them. What to do about accidents and breakdowns in a stable system is entirely different from action to take in an unstable system.
       13. Everybody must be on a team to work for improvement of quality in the four steps of the Shewhart Cycle.
           - Improvement of the system will help everybody, and will decrease the spread between the figures for the performances of people.
       14. A leader and his people understand the meaning of a system, and how the work of his group may support its aim.
           - A leader is working in cooperation with preceding stages and with following stages toward optimisation of the efforts of all stages. He sees his group as a component in a system.
           - He understands the benefits of cooperation and the losses from competition between people and between groups.

      Clocks: PNGs 029 (printed p.25), 031 (printed p.27), 033
      (printed p.29) each carry a clock glyph.

      IMPLEMENTATION: render all 14 principles as one long blue
      ordered/nested list, with the top-level points bold and
      sub-points as bullets. Use a section-level .deming_quote wrapper
      if that's how Day 5 handled Deming's attributes; otherwise use
      a dedicated class — confirm by reading a Day 5 chapter.

