# ------ Implementation Notes ------
# Lessons learned from building chapters 1–6:
#
# 1. ALWAYS read the source page where the next chapter's heading appears
#    to confirm where the current chapter ends. The brief page ranges are
#    approximate — off by 1 for most chapters 7+.
#
# 2. Chapters without interactive elements (Ch6, Ch7, Ch8) are significantly
#    faster to build — just text transcription + image cropping.
#
# 3. For image cropping from full-res PNGs (2550x3300):
#    - Running headers ("Understanding Variation...") are at y≈0-120
#    - Page footers ("Day 3 : page N") are at y≈3150-3300
#    - Clock icons appear at y≈120-200 on pages that have them
#    - Expect 3-5 crop iterations to get clean results
#
# 4. Auto-extracted images (assets/images/day-03/day-03-page-XXX-table-YY.png)
#    are useful as quick reference but are individual element extractions.
#    For composite figures (like the 12-chart grid), crop manually from
#    full-res PNGs to preserve the original layout.
#
# 5. The text frequently references printed page numbers ("page 19", etc.).
#    Keep these as-is in the transcription — exact copy of original.

