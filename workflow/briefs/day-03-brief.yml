context_notes: |
  Day 3 is the longest day (66 pages). The Funnel Experiment is a major
  hands-on activity spanning ~20 pages with colourful track diagrams.

  Key cross-references:
  - Sales data from Day 2 (pages 1–3 of Day 2) is revisited on p.14
  - Red Beads Experiment from Day 2 is referenced throughout
  - Technical Aid 1 from Day 1 (Appendix) is referenced on p.17
  - DemDim Chapter 5 is assigned reading on p.62
  - "Springboard" article referenced in Ch6 and Ch9

  The source teaches Rule 2 BEFORE Rule 1 — this is intentional pedagogy
  (Rule 2 = Ford's strategy, Rule 1 = simpler "do nothing" baseline).
  Preserve this ordering.

  Activities 3-d and 3-e are drawing/charting activities. In the web
  version, provide the blank chart images with instructions — users will
  work on paper or mentally.

  The data recording tables (Rules 1–4) are large structured tables.
  Consider using interactive HTML tables or images of the blank tables
  with instructions.
