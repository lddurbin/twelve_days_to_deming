# ------ Context Notes ------
context_notes: |
  Day 10 is the first half of the Second Project (Day 11 is the
  second half). Structurally it is extremely clean: an intro, then
  Part A (Appreciation for a System) with reading + activity, then
  Part B (Theory of Variation) with reading + activity, then a
  short out-of-hours note.

  This day has a very different texture from Days 1-9:
  - NO Pauses for Thought
  - NO Technical Aids
  - NO clocks (except possibly one small icon on page 13)
  - NO Red Beads, no Funnel, no Dice
  - NO float boxes, no major activity blue-pill heading
  - Only ONE figure (the bowling/orchestra/business diagram on p 10)

  The interactive elements are concentrated entirely in the two
  Activities (10-a and 10-b), each of which is 19 input items
  (14 Points + 5 Deadly Diseases) with rating + comment boxes.

  STYLING: Deming's May 1990 text is rendered in BLUE in the source
  throughout Parts A and B. Neave's interleaved commentary is in
  italic/square brackets. Follow the Day 9 approach for blue Deming
  text — use `.deming_quote` class or similar blue styling; for
  Neave interleaved commentary use `.neave_note` or equivalent.

  The chapter plan deliberately keeps Part A and Part B each as a
  single long chapter rather than splitting at Step 2/Step 3
  boundaries. Reason: Step 3 (the "now read DemDim version" step)
  is only a short paragraph pointing the reader elsewhere, not its
  own substantive content — splitting would create a runt chapter.
  Activities 10-a and 10-b are split out as their own chapters
  because they are large interactive components that benefit from
  their own download scope and workbook callout handling.

  DemDim page references throughout:
    - Part A: DemDim 264-270 (Chapter 18 "Appreciation for a System")
    - Part B: DemDim 270-274 (Chapter 18 continued, Theory of Variation)
    - Out-of-hours note: DemDim 274-279 (for Day 11 prep)

  Workbook page references:
    - Part A pages 3-19 → WB 154-170
    - Part B pages 20-32 → WB 171-183

  Reading references to earlier days:
    - Day 9 page 2 (Scherkenbach flow diagram)
    - Day 9 page 22 (Scholtes diagram)
    - Day 9 page 27 (0-5 rating scale explanation)
    - Day 9 pages 27-28 (Point/Disease refresher table)
    - Day 7 page 22 (Taguchi loss function)
    - Day 7 page 35 (Obstacles set)
    - Day 4 pages 16-25 and Day 5 pages 2-17 (14 Points source)
    - Day 5 pages 18-27 (Deadly Diseases source)
