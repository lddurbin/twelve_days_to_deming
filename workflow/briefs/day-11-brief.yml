# ------ Context Notes ------
context_notes: |
  Day 11 is the second half of the Second Project (Day 10 was the
  first half). It covers Parts C and D of Deming's System of Profound
  Knowledge, completing the set begun on Day 10 (Parts A and B).

  Structurally very similar to Day 10:
  - NO Pauses for Thought (none at all in Day 11)
  - NO Technical Aids
  - NO clocks visible in the source material
  - NO Red Beads, no Funnel, no Dice
  - NO float boxes, no major activity blue-pill heading
  - Only TWO figures (banner graphic and circular diagram)

  The interactive elements are concentrated in the two Activities
  (11-a and 11-b), each with 19 input items (14 Points + 5 Deadly
  Diseases) — exactly the same pattern as Activities 10-a and 10-b.

  STYLING: Same as Day 10 — Deming's May 1990 text in BLUE
  (.deming_quote), Neave's interleaved commentary in italic
  (.neave_note). Follow Day 10's established approach.

  Part C is split into three Areas (Prediction, Theory and Learning,
  Operational Definitions), each following the same four-step
  procedure. Part D stays as one chapter because it doesn't subdivide
  into areas — Item 5 (intrinsic/extrinsic motivation) runs very
  long but is continuous.

  DemDim page references:
    - Part C Area 1: DemDim 274-275 (Prediction)
    - Part C Area 2: DemDim 275-276 (Theory and Learning)
    - Part C Area 3: DemDim 276 paragraphs 8-10 (Operational Definitions)
    - Part C complete: DemDim 274-276
    - Part D: DemDim 277-279 (Knowledge of Psychology)

  Cross-references to earlier days:
    - Day 10 (Parts A and B of SoPK, Activities 10-a and 10-b)
    - Day 9 page 27 (0-5 rating scale explanation)
    - Day 4 pages 16-25 and Day 5 pages 2-17 (14 Points source)
    - Day 5 pages 18-27 (Deadly Diseases source)
    - Pause for Thought 2-b (referenced on page 11 re: theory)

  The New Economics references:
    - Part C: Chapter 4 pages 66-72
    - Part D: Chapter 4 pages 73-78
