# ------ Context Notes ------
context_notes: |
  Schedule from page 3 (approximate):
  - 9:00am-1:00pm; 2:00pm-6:00pm
  - Introduction (p1)
  - Outline of today's work (p3); Joy in work (p4) → Activity 8-a
  - Innovation — not just improvement (p6) → Activity 8-b
  - Cooperation: win-win — backbone of the new philosophy (p8) → Activity 8-c
  - Introduction to the Major Activity (p10)
  - Introduction to the Major Activity (continued) (p11)
  - Major Activity 8-d (p18)
  - "Out-of-hours" note (p28)

  Key themes: Day 8 marks the transition to the "New Climate" — the three
  pillars of Joy in Work, Innovation, and Cooperation that Deming/Neave
  advocate as replacements for the "Old Climate" practices covered in
  Days 5-7. The Major Activity is the centrepiece: a multi-step exercise
  demonstrating how cooperation (considering effects on other areas)
  produces dramatically better outcomes than selfish optimisation.

  The three preliminary activities (8-a, 8-b, 8-c) share an identical
  5-question template, substituting the topic. This parallel structure
  is intentional — Neave wants participants to apply the same reflective
  framework to all three pillars of the New Climate.

  The Major Activity exercises (Tables One-Five) come from DemDim
  Chapter 15 and illustrate "Huge Financial Advantages" of cooperation.
  The exercise progresses through three phases:
  Phase 1 (Table One): "Darkness" — each area adopts options in its own
    self-interest only
  Phase 2 (Tables Two-Three): Consider effects on other areas, keep only
    options with positive net effect on the organisation
  Phase 3 (Tables Four-Five): "New Climate" — areas consider options that
    may disadvantage themselves but benefit the organisation as a whole

  The "aha moment" is comparing the heap of + signs in Table Five vs
  Table One — dramatically better outcomes from cooperation.

  DemDim Chapter references:
  - Chapter 13: Joy in Work (pp 197-203)
  - Chapter 14: Innovation — not just Improvement (pp 203-212)
  - Chapter 15: Cooperation: Win-Win — Backbone of the New Philosophy
    (pp 213-231, but postpone final pages until Major Activity)

  The DemDim example uses three areas (A, B, C) with 2-3 options each.
  The course materials also provide 4-area tables for those who want to
  include a fourth area (e.g. senior management). The interactive widget
  should support configurable area count (3 or 4).

  "Out-of-hours" note (page 28): Prepare copies of Day 9 pages 13-14
  (WB 146-147) at Stages 3 and 4, Day 9 page 15 (WB 148), and Day 9
  page 29 (WB 150) for the next day's Major Activity.

  No Pauses for Thought or Technical Aids in Day 8 — it is purely
  activity-driven.
