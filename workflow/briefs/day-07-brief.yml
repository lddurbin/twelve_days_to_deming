# ------ Context Notes ------
context_notes: |
  Schedule from page 3 (approximate):
  - 9:00am-1:00pm; 3:00pm-6:00pm
  - Introduction (p1)
  - Three kinds of numerical targets (p3) → begins Activities 7-a and 7-b
  - Performance Indicators (p6) → Pause for Thought 7-c
  - "Just do it"? (p7)
  - Many more true stories (p9) → continues Activities 7-a and 7-b
  - Activity 7-d (p18)
  - The thirteenth obstacle (p19)
  - Activity 7-e (pp20-22)
  - Pause for Thought 7-f (p23), 7-g (p24), 7-h (p25)
  - A cutting process (p26)
  - Introduction to Major Activity (p27)
  - Major Activity 7-i (pp28-35) — 16 Obstacles to the Transformation
  - "Out-of-hours" note (p35-36)

  Key themes: This day tackles the most controversial aspects of Deming's teaching
  — targets, appraisals, performance indicators, pay for performance, league tables.
  The Taguchi loss function exercise provides mathematical grounding for why
  conformance to specifications is inadequate. The Major Activity covers all 16
  of Deming's "Obstacles to the Transformation" from Out of the Crisis.

  The "Many more true stories" section (10 pages) is heavily narrative with many
  sub-stories. Most are presented through "John" (anonymous contributor) with
  italicised commentary from Neave. The Hansard extracts (pp16-17) about DWP
  targets are particularly long and detailed.

  Footnote a (p15/p36): BBC News report quotation about BT/Ministry of Defence
  call centre, published 30 October 2008, included with BBC approval.

  "Today definitely needs a full day's work!" — mentioned on page 2.

  This is the last day focused on the "Old Climate" — page 36 marks the
  transition: "So ends our concentration on the 'Old Climate'. For the rest
  of the course: forward with the 'New Climate'!"
